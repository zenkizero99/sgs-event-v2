<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event Slideshow</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:radial-gradient(circle,#1b2735,#090a0f);
  font-family:sans-serif;
  color:white;
}
#slideshow{
  position:relative;
  width:100vw;
  height:100vh;
}
.balloon{
  position:absolute;
  bottom:-300px;
  width:280px;
  display:flex;
  flex-direction:column;
  align-items:center;
  animation:floatUp linear forwards;
  transform:translateX(-50%);
}
@keyframes floatUp{
  0%{transform:translate(-50%,0);}
  100%{transform:translate(-50%,-130vh);}
}
.circle{
  width:160px;
  height:190px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:bold;
  padding:10px;
}
.string{
  width:2px;
  height:80px;
  background:white;
}
.ribbon{
  margin-top:5px;
  padding:8px 20px;
  background:linear-gradient(90deg,#b71c1c,#e53935);
  border-radius:6px;
}
.company{
  margin-bottom:6px;
  padding:5px 15px;
  background:gold;
  color:black;
  border-radius:20px;
  font-weight:bold;
}
.highlight{
  box-shadow:0 0 40px gold;
}
</style>
</head>
<body>

<div id="slideshow"></div>

<script>

let participants=[];
let knownIds=new Set();
let index=0;
const container=document.getElementById("slideshow");

function randomColor(){
  const colors=["#ff4d6d","#ff9f1c","#2ec4b6","#4361ee","#7209b7","#f72585"];
  return colors[Math.floor(Math.random()*colors.length)];
}

async function fetchData(){
  const res=await fetch("/api/list");
  const data=await res.json();

  data.forEach(p=>{
    if(!knownIds.has(p.id)){
      showSpecial(p);
      knownIds.add(p.id);
    }
  });

  participants=data;
}

setInterval(fetchData,3000);
fetchData();

function showLoop(){

  if(participants.length===0){
    setTimeout(showLoop,3000);
    return;
  }

  for(let i=0;i<3;i++){

    if(index>=participants.length) index=0;

    const p=participants[index];

    let b=document.createElement("div");
    b.className="balloon";
    b.style.left=(20+i*30)+"%";
    b.style.animationDuration=(20+Math.random()*5)+"s";

    b.innerHTML=`
      <div class="company">${p.company}</div>
      <div class="circle" style="background:${randomColor()}">
        ${p.name}
      </div>
      <div class="string"></div>
      <div class="ribbon">${p.wish}</div>
    `;

    container.appendChild(b);
    setTimeout(()=>b.remove(),25000);

    index++;
  }

  setTimeout(showLoop,8000);
}

showLoop();

function showSpecial(p){

  let b=document.createElement("div");
  b.className="balloon highlight";
  b.style.left="50%";
  b.style.animationDuration="18s";

  b.innerHTML=`
    <div class="company">${p.company}</div>
    <div class="circle" style="background:gold;color:black;">
      ${p.name}
    </div>
      <div class="string"></div>
    <div class="ribbon">${p.wish}</div>
  `;

  container.appendChild(b);
  setTimeout(()=>b.remove(),20000);
}
</script>
</body>
</html>
